name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest silent_success_gym/test_silent_success.py -q
